    .card {

      font-size: 16px;

      color: #6b6b6b;
      margin-top: -14px;
      margin-bottom: 18px;

    }

    .info {
      font-size: 14px;
      line-height: 1.65;
      color: #333;
    }

    .label {
      color: #666;
    }

    .info a {
      color: #0057b8;
      text-decoration: none;
      font-weight: 600;
    }

    .row {
      margin: 10px 0;
    }

    .divider {
      height: 1px;
      background: #eee;
      margin: 16px 0;
