<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Kontakt – Joe Möbius</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- tecis Typografie: DM Sans als Hausschrift (Google Font) -->
  <!-- CI: DM Sans wird als Hausschrift verwendet; Fallback in Office/ohne Webfont: Arial. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root{
      /* tecis Farben (CI) */
      --tecis-blue: #00325b;   /* tecis Blau (Primär) */     /* [2](https://slde-my.sharepoint.com/personal/joe_moebius_tecis_de/Documents/99%20Microsoft%20Ordner/Microsoft%20Copilot%20Chat-Dateien/tecis_Styleguide_Farben.pdf) */
      --tecis-sky:  #009ee3;   /* Himmelblau (100%) */       /* [2](https://slde-my.sharepoint.com/personal/joe_moebius_tecis_de/Documents/99%20Microsoft%20Ordner/Microsoft%20Copilot%20Chat-Dateien/tecis_Styleguide_Farben.pdf) */
      --tecis-sand: #cbcdb9;   /* Sand (Sekundär) */         /* [2](https://slde-my.sharepoint.com/personal/joe_moebius_tecis_de/Documents/99%20Microsoft%20Ordner/Microsoft%20Copilot%20Chat-Dateien/tecis_Styleguide_Farben.pdf) */

      --white: #ffffff;
      --text:  #0f1a22;
      --muted: #4b5a66;

      /* Sand dezent als Hintergrund-Rasterung/Anmutung (>=15%) */
      --sand-15: rgba(203,205,185,0.15);
      --sand-25: rgba(203,205,185,0.25);
    }

    *{ box-sizing: border-box; }

    body{
      margin:0;
      padding:24px;

      /* dezenter, CI-konformer Hintergrund (Sand-„Anmutung“, kein tecis Blau gerastert) */
      background:
        radial-gradient(900px 520px at 12% 8%, var(--sand-25) 0%, rgba(203,205,185,0) 58%),
        radial-gradient(900px 520px at 90% 22%, var(--sand-15) 0%, rgba(203,205,185,0) 62%),
        #f4f5f7;

      color: var(--text);

      /* tecis Hausschrift */
      font-family: "DM Sans", Arial, sans-serif; /* [1](https://slde-my.sharepoint.com/personal/joe_moebius_tecis_de/Documents/99%20Microsoft%20Ordner/Microsoft%20Copilot%20Chat-Dateien/tecis_Styleguide_Typografie.pdf) */
    }

    .wrap{
      max-width: 460px;
      margin: 0 auto;
    }

    .card{
      background: var(--white);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 12px 34px rgba(0,0,0,0.10);
      border: 1px solid rgba(0,0,0,0.04);
    }

    /* Header: links Text, rechts Logo */
    .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 16px;
    }

    /* Name: Option B – DM Sans, ruhig/clean, weight 600 */
    h1{
      margin: 0 0 6px 0;
      font-size: 26px;
      line-height: 1.15;
      letter-spacing: -0.2px;

      font-family: "DM Sans", Arial, sans-serif;
      font-weight: 600; /* gewünscht */
      color: var(--tecis-blue);

      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .subtitle{
      margin: 0;
      font-size: 14px;
